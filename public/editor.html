<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/img/blog-station.png">
    <title>Blog : Editor</title>

    <link rel="stylesheet" href="/css/home.css">
    <link rel="stylesheet" href="/css/editor.css">

</head>
<body>

     <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
<a href="/" class="logo">
                <img src="/img/blog-station.png" alt="BlogStation" class="logo-img">
                <span class="logo-text">Blog</span><span class="logo-accent">Station</span>
            </a>
            <ul class="nav-links">
                <li><a href="/blog" class="nav-link">Home</a></li>
                <li><a href="/editor" class="nav-link active">Write</a></li>
                <li><a href="/profile" class="nav-link">Profile</a></li>
                <li><a href="#" id="logout-btn" class="nav-link btn-logout">Logout</a></li>
            </ul>
            <div class="mobile-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>
    

    <div class="banner">
        <div class="banner-placeholder">
            <p>Add a cover image for your blog</p>
        </div>
        <input type="file" accept="image/*" id="banner-upload" hidden>
        <label for="banner-upload" class="banner-upload-btn">
            <img src="/img/upload.png" alt="upload banner">
        </label>
    </div>

    <div class="blog-editor-container">
        <div class="blog">
            <textarea type="text" class="title" placeholder="Blog title..."></textarea>
            <div class="title-divider"></div>
            <textarea type="text" class="article" placeholder="Start writing here..."></textarea>
        </div>

        <div class="editor-tips">
            <h4>Writing tips</h4>
            <ul>
                <li>Use headings (`#`, `##`) to structure your blog.</li>
                <li>Add images with the upload button or markdown syntax.</li>
                <li>Keep paragraphs short and easy to read.</li>
            </ul>
        </div>
    </div>

    <div class="blog-options">
        <button class="btn dark publish-btn">publish</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.9.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.9.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.9.1/firebase-firestore.js"></script>

    <script src="/js/firebase.js"></script>
    <script src="/js/editor.js"></script>
    <script>
        // Mobile Menu Toggle for Editor page
        document.addEventListener('DOMContentLoaded', function() {
            const mobileMenuBtn = document.querySelector('.mobile-menu');
            const navLinks = document.querySelector('.nav-links');
            
            if (mobileMenuBtn && navLinks) {
                mobileMenuBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    mobileMenuBtn.classList.toggle('active');
                    navLinks.classList.toggle('mobile-active');
                });
                
                document.addEventListener('click', function(e) {
                    if (!mobileMenuBtn.contains(e.target) && !navLinks.contains(e.target)) {
                        mobileMenuBtn.classList.remove('active');
                        navLinks.classList.remove('mobile-active');
                    }
                });
                
                window.addEventListener('resize', function() {
                    if (window.innerWidth > 768) {
                        mobileMenuBtn.classList.remove('active');
                        navLinks.classList.remove('mobile-active');
                    }
                });
            }
        });
    </script>

</body>
</html>
