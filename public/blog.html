<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - BlogStation</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/home.css">
    <link rel="stylesheet" href="/css/editor.css">
    <link rel="stylesheet" href="/css/blog.css">

</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <span class="logo-text">Blog</span><span class="logo-accent">Station</span>
            </a>
            <ul class="nav-links">
                <li><a href="/blog" class="nav-link active">Home</a></li>
                <li><a href="/editor" class="nav-link">Write</a></li>
                <li><a href="/profile" class="nav-link">Profile</a></li>
                <li><a href="#" id="logout-btn" class="nav-link btn-logout">Logout</a></li>
            </ul>
            <div class="mobile-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>
    
    <!-- Blog Layout: content left, suggestions right -->
    <div class="blog-layout">
        <div class="blog-main">
            <div class="banner"></div>
            <div class="blog">
                <h1 class="title"></h1>
                <p class="published"><span>Published on </span></p>
                <hr class="blog-divider">
                <div class="article">
                    <!-- Article content will be inserted here -->
                </div>
            </div>
        </div>

        <aside class="blog-sidebar">
            <!-- Related Blogs Section -->
            <section class="blogs-section">
                <!-- Related blogs will be loaded here -->
            </section>
        </aside>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <a href="/" class="logo">
                        <span class="logo-text">Blog</span><span class="logo-accent">Station</span>
                    </a>
                    <p>A platform for writers to share their stories with the world.</p>
                </div>
                <div class="footer-links">
                    <div class="footer-col">
                        <h4>Platform</h4>
                        <a href="/blog">Home</a>
                        <a href="/editor">Write</a>
                        <a href="/profile">Profile</a>
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 BlogStation. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.9.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.9.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.9.1/firebase-firestore.js"></script>

    <script src="/js/firebase.js"></script>
    <script src="/js/blog.js"></script>
    
</body>
</html>
