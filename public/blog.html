<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/img/blog-station.png">
    <title>Blog - BlogStation</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/home.css">
    <link rel="stylesheet" href="/css/editor.css">
    <link rel="stylesheet" href="/css/blog.css">

</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
<a href="/" class="logo">
                <img src="/img/blog-station.png" alt="BlogStation" class="logo-img">
                <span class="logo-text">Blog</span><span class="logo-accent">Station</span>
            </a>
            <ul class="nav-links">
                <li><a href="/blog" class="nav-link active">Home</a></li>
                <li><a href="/editor" class="nav-link">Write</a></li>
                <li><a href="/profile" class="nav-link">Profile</a></li>
                <li><a href="#" id="logout-btn" class="nav-link btn-logout">Logout</a></li>
            </ul>
            <div class="mobile-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>
    
    <!-- Blog Layout: listing layout only -->
    <div class="blog-layout is-listing-layout">
        <section class="blogs-section is-listing" id="blogs-section">
            <!-- Blogs will be loaded here by blog.js -->
        </section>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-inner">
                <a href="/" class="footer-logo">
                    <span class="logo-text">Blog</span><span class="logo-accent">Station</span>
                </a>
                <nav class="footer-nav">
                    <a href="/blog">Home</a>
                    <a href="/editor">Write</a>
                    <a href="/profile">Profile</a>
                </nav>
                <p class="footer-copy">&copy; 2026 BlogStation. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.9.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.9.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.9.1/firebase-firestore.js"></script>

    <script src="/js/firebase.js"></script>
    <script src="/js/blog.js"></script>
    
</body>
</html>
